name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        shell: bash
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          BINARY="arduino-mcp-${{ matrix.goos }}-${{ matrix.goarch }}$EXT"
          go build -o "$BINARY" ./cmd/arduino-mcp/
          sha256sum "$BINARY" > "$BINARY.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: arduino-mcp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: arduino-mcp-*

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: arduino-mcp-*
          generate_release_notes: true
          make_latest: true
