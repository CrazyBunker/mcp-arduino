name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Lint
        run: go vet ./...

      - name: Build
        run: go build -o arduino-mcp ./cmd/arduino-mcp/

      - uses: actions/upload-artifact@v4
        with:
          name: arduino-mcp-linux-amd64
          path: arduino-mcp
